<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schoology Null - Dashboard</title>
  <!-- This line links your HTML to the external style sheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- SIDEBAR NAVIGATION -->
  <aside>
    <h1>NULL</h1>
    <nav>
      <!-- These links will navigate to your other sub-pages later -->
      <a href="index.html" class="active">Dashboard</a>
      <a href="courses.html">Courses</a>
      <a href="grades.html">Grades</a>
      <a href="calendar.html">Calendar</a>
    </nav>
  </aside>

  <!-- MAIN CONTENT AREA -->
  <main>
    <header>
      <h2>Welcome back, Student</h2>
      <p>Here is an overview of your current classes.</p>
    </header>

    <!-- CLASS CARDS GRID -->
    <section class="grid">
      
      <!-- Period 1 Card -->
      <div class="card english">
        <div class="banner">
          <h3>AP English 12</h3>
        </div>
        <p>Period 1 • Room 204</p>
        <div class="footer">
          <span class="badge green">No Homework</span>
          <span class="grade">A (95%)</span>
        </div>
      </div>

      <!-- Period 2 Card -->
      <div class="card math">
        <div class="banner">
          <h3>Calculus BC</h3>
        </div>
        <p>Period 2 • Room 112</p>
        <div class="footer">
          <span class="badge amber">1 Missing Item</span>
          <span class="grade">B+ (88%)</span>
        </div>
      </div>

      <!-- Period 3 Card -->
      <div class="card history">
        <div class="banner">
          <h3>US History</h3>
        </div>
        <p>Period 3 • Room 301</p>
        <div class="footer">
          <span class="badge blue">Due Tomorrow</span>
          <span class="grade">A- (92%)</span>
        </div>
      </div>

    </section>
  </main>

</body>
</html>
